<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0e0f11" />
    <title>SayNine Xtreme</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0e0f11;
        overflow: hidden;
      }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        color: #fff;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        /* INPUT-03: critical — prevents page scroll/zoom while swiping. */
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game" tabindex="0"></canvas>
    <div id="hud"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
